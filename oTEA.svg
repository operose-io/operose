<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="100%" stop-color="#008B8B"/>
    </linearGradient>
  </defs>

  <!-- Coin -->
  <circle cx="256" cy="256" r="256" fill="url(#coinGrad)"/>

  <defs>
    <!-- Sharp turbine blade -->
    <path id="blade" d="
      M 0 -82
      L 44 -44
      L 30 6
      L -10 92
      L -6 46
      L -30 -8
      Z"/>
  </defs>

  <!-- 8 blades -->
  <g fill="#FFFFFF">
    <g transform="translate(256 256) rotate(0)   translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(45)  translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(90)  translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(135) translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(180) translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(225) translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(270) translate(0 -120) rotate(-35)"><use href="#blade"/></g>
    <g transform="translate(256 256) rotate(315) translate(0 -120) rotate(-35)"><use href="#blade"/></g>
  </g>
</svg>
